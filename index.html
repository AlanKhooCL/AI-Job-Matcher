<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Matcher AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Job Matcher AI</h1>
    <p>Upload your resume and paste up to 3 job URLs to evaluate your fit.</p>

    <form id="jobForm">
      <div class="form-group">
        <label for="resume">1. Upload Resume (PDF)</label>
        <input type="file" id="resume" accept=".pdf" required>
      </div>

      <div class="form-group">
        <label>2. Paste Job URLs</label>
        <input type="url" id="url1" placeholder="Job URL 1" required>
        <input type="url" id="url2" placeholder="Job URL 2 (Optional)">
        <input type="url" id="url3" placeholder="Job URL 3 (Optional)">
      </div>

      <button type="submit" id="submitBtn">Evaluate Matches</button>
    </form>

    <div id="loading" class="hidden">
      <p>Scraping jobs and consulting Gemini... This might take a minute.</p>
    </div>

    <div id="results"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
